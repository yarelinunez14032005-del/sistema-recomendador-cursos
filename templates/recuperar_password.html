<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recuperar contraseña</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    width:400px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

input, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>Recuperar contraseña</h2>

{% if mensaje %}
<p style="color:green;">{{ mensaje }}</p>
{% endif %}

<form method="POST">
    <input type="email" name="correo" placeholder="Ingresa tu correo" required>
    <button type="submit">Buscar cuenta</button>
</form>

<br>
<a href="/login">← Volver al login</a>

</div>

</body>
</html>
