
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4f46e5,#7c3aed);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:35px;
    border-radius:20px;
    width:380px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{text-align:center;margin-bottom:25px;}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

.password-box{
    position:relative;
}

.password-box button{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    border:none;
    background:none;
    cursor:pointer;
}

.btn{
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.link{
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h1>Iniciar Sesión</h1>

<form action="/validar" method="POST">

<input type="email" name="correo" placeholder="Correo electrónico" required>

<br><br>

<div class="password-box">
<input type="password" id="password" name="password" placeholder="Contraseña" required>

<button type="button" id="btnOjo" onclick="mostrarPassword()">
<i class="bi bi-eye"></i>
</button>
</div>

<br><br>

<button class="btn" type="submit">Ingresar</button>

</form>
<div style="margin-top:10px; text-align:center;">

    <a href="/recuperar_password" style="color:#2563eb; text-decoration:none;">
        ¿Olvidaste tu contraseña?
    </a>

</div>

<div class="link">
<a href="/registro">Crear cuenta</a>
</div>

</div>

<script>
function mostrarPassword(){
let campo=document.getElementById("password");
let icono=document.querySelector("#btnOjo i");

if(campo.type==="password"){
campo.type="text";
icono.classList.replace("bi-eye","bi-eye-slash");
}else{
campo.type="password";
icono.classList.replace("bi-eye-slash","bi-eye");
}
}
</script>

</body>
</html>
