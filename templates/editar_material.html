<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar Material</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    width:400px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    margin-top:15px;
    width:100%;
    padding:10px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>✏ Editar Material</h2>

<p>Archivo actual: <b>{{ material[2] }}</b></p>

<form method="POST" enctype="multipart/form-data">

    <label>Nuevo archivo</label>
    <input type="file" name="archivo" required>

    <button type="submit">Guardar cambios</button>

</form>

</div>

</body>
</html>
