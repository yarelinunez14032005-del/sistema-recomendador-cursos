<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Configuración</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

.card-config{
    max-width:900px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.titulo{
    text-align:center;
    margin-bottom:30px;
}

.seccion{
    margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<div class="card-config">

    <h1 class="titulo">
        ⚙️ Configuración
    </h1>

    <p class="text-center text-muted">
        Personaliza tu experiencia dentro de la plataforma.
    </p>

    <form method="POST" action="/configuracion">
    
{% if config %}

<div class="alert alert-success">

    <strong>Configuración actual:</strong><br>

    Tema: {{ config[1] }}<br>
    Color: {{ config[2] }}<br>
    Categoría favorita: {{ config[3] }}<br>
    Nivel preferido: {{ config[4] }}

</div>

{% endif %}

    <!-- APARIENCIA -->

    <div class="seccion">

        <h4>🎨 Apariencia</h4>

        <label class="form-label mt-3">
            Tema
        </label>

        <select class="form-select" name="tema">
    
          <option value="claro">☀️ Claro</option>
          <option value="oscuro">🌙 Oscuro</option>
        </select>
        

        <label class="form-label mt-3">
            Color Principal
        </label>
        
        <select class="form-select" name="color">
          <option value="azul">🔵 Azul</option>
          <option value="verde">🟢 Verde</option>
          <option value="morado">🟣 Morado</option>
          <option value="rojo">🔴 Rojo</option>
        </select>

    </div>

    <hr>

    <!-- PREFERENCIAS -->

    <div class="seccion">

        <h4>📚 Preferencias</h4>

        <label class="form-label mt-3">
            Categoría Favorita
           
        </label>

        <select class="form-select" name="categoria">
         <option value="Programación">Programación</option>
         <option value="Desarrollo Web">Desarrollo Web</option>
         <option value="Base de Datos">Base de Datos</option>
         <option value="Inteligencia Artificial">Inteligencia Artificial</option>
         <option value="Ciencia de Datos">Ciencia de Datos</option>
         <option value="Redes">Redes</option>
         <option value="Ciberseguridad">Ciberseguridad</option>
         <option value="Informatica">Informatica</option>
         <option value="Inglés">Inglés</option>
         <option value="Matemáticas">Matemáticas</option>
         <option value="Diseño Gráfico">Diseño Gráfico</option>
         <option value="Marketing Digital">Marketing Digital</option>
         <option value="Ofimática">Ofimática</option>
        </select>
       

        <label class="form-label mt-3">
            Nivel Preferido
        </label>

        <select class="form-select" name="nivel">
          <option value="Básico">Básico</option>
          <option value="Intermedio">Intermedio</option>
          <option value="Avanzado">Avanzado</option>
        </select>

    </div>

    <hr>

    <!-- OPCIONES -->

    <div class="seccion">

        <h4>🔔 Opciones</h4>

        <div class="form-check mt-3">

            <input class="form-check-input"
                   type="checkbox"
                   checked>

            <label class="form-check-label">
                Mostrar progreso en la página principal
            </label>

        </div>

        <div class="form-check">

            <input class="form-check-input"
                   type="checkbox"
                   checked>

            <label class="form-check-label">
                Mostrar recomendaciones automáticas
            </label>

        </div>

        <div class="form-check">

            <input class="form-check-input"
                   type="checkbox">

            <label class="form-check-label">
                Recordatorios de cursos
            </label>

        </div>

    </div>

    <hr>

    <div class="text-center">

        <button type="submit" class="btn btn-primary">
            💾 Guardar Configuración
        </button>

        <a href="/"
           class="btn btn-success">

            🏠 Volver al Inicio

        </a>

    </div>

</div>
</from>
</div>

</body>
</html>
