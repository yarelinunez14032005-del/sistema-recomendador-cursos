<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin - Cursos</title>

<style>

body{
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

h1{
    text-align: center;
    color: #333;
}

.container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: auto;
}

.card{
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.titulo{
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.badge{
    display: inline-block;
    padding: 5px 10px;
    border-radius: 20px;
    background: #4facfe;
    color: white;
    font-size: 12px;
}

.btn{
    display: block;
    text-align: center;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

.ver{
    background: #4facfe;
}

.ver:hover{
    background: #0077ff;
}

.eliminar{
    background: #dc3545;
}

.eliminar:hover{
    background: #b52a37;
}

.editar{
    background: #ff9800;
}

.editar:hover{
    background: #e68900;
}

.top{
    text-align: center;
    margin-bottom: 20px;
}

.top a{
    text-decoration: none;
    padding: 10px 15px;
    background: #111;
    color: white;
    border-radius: 10px;
}

</style>

</head>

<body>

<h1>📚 Panel Admin - Cursos</h1>

<div class="top">
    <a href="/">🏠 Inicio</a>
</div>

<div class="container">

{% for c in cursos %}

<div class="card">

    <div class="titulo">{{ c[1] }}</div>

    <div class="badge">{{ c[2] }}</div>

    <p><b>Nivel:</b> {{ c[3] }}</p>

    <a class="btn ver" href="/admin/curso/{{ c[0] }}">
       📂 Ver como admin
    </a>

    <a class="btn editar" href="/editar_curso/{{ c[0] }}">
        ✏ Editar
    </a>

    <a class="btn eliminar"
       onclick="return confirm('¿Eliminar este curso?')"
       href="/eliminar_curso/{{ c[0] }}">
        🗑 Eliminar
    </a>

</div>

{% endfor %}

</div>

</body>
</html>
