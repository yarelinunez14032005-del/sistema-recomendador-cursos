<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mi Perfil</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

.card-perfil{
    max-width:700px;
    margin:auto;
    margin-top:50px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.titulo{
    text-align:center;
    margin-bottom:30px;
    color:#2d3748;
}

.info{
    font-size:18px;
    margin-bottom:20px;
}

.botones{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:25px;
}

</style>

</head>

<body>

<div class="container">

    <div class="card-perfil">

        <h1 class="titulo">
            👤 Mi Perfil
        </h1>

        <div class="info">
            <strong>Nombre:</strong>
            {{ usuario.nombre }}
        </div>

        <div class="info">
            <strong>Correo:</strong>
            {{ usuario.email }}
        </div>

        <div class="info">
            <strong>Rol:</strong>
            {{ usuario.rol }}
        </div>

        <div class="info">
            <strong>Contraseña:</strong>
            ********
        </div>

        <div class="info">
            <strong>Historial:</strong>
            Cursos realizados
        </div>

        <div class="botones">

            <a href="/editar_perfil" class="btn btn-primary">
                ✏️ Editar Perfil
            </a>

            <a href="/cambiar_password" class="btn btn-warning">
                🔐 Cambiar Contraseña
            </a>

            <a href="/" class="btn btn-success">
                🏠 Volver al Inicio
            </a>

        </div>

    </div>

</div>

</body>
</html>
