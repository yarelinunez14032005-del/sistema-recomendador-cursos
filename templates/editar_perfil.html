<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar Perfil</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

.card-editar{
    max-width:700px;
    margin:50px auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.titulo{
    text-align:center;
    margin-bottom:30px;
    color:#2d3748;
}

.btn-guardar{
    background:#0d6efd;
    border:none;
}

.btn-guardar:hover{
    background:#0b5ed7;
}

</style>

</head>

<body>

<div class="container">

    <div class="card-editar">

        <h1 class="titulo">
            ✏️ Editar Perfil
        </h1>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Nombre
                </label>

                <input
                    type="text"
                    name="nombre"
                    value="{{ usuario.nombre }}"
                    class="form-control"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Correo Electrónico
                </label>

                <input
                    type="email"
                    name="correo"
                    value="{{ usuario.email }}"
                    class="form-control"
                    required>

            </div>

            <div class="d-grid">

                <button
                    type="submit"
                    class="btn btn-primary btn-guardar">

                    💾 Guardar Cambios

                </button>

            </div>

        </form>

        <hr>

        <div class="text-center">

            <a href="/perfil" class="btn btn-outline-secondary">
                ⬅ Volver al Perfil
            </a>

        </div>

    </div>

</div>

</body>
</html>
